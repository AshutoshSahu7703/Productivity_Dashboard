<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"/>
</head>
<body>
    <div id="main">
        <nav>

        </nav>
        <div class="allElem">
            <div class="todo elem" id="0">
                <img src="https://i.pinimg.com/736x/3b/a7/cd/3ba7cdfbcb513938ed8d7ce56d57ba88.jpg" alt="">
                <h2>To Do List</h2>
            </div>
             <div class="daily elem" id="1">
                <img src="https://i.pinimg.com/webp/1200x/b6/71/6a/b6716aeb4d28424f6cf24886aa46724c.webp" alt="">
                <h2>Daily planner</h2>
            </div>
             <div class="pomo elem" id="2">
                <img src="https://i.pinimg.com/736x/b9/c8/1b/b9c81b84c7ea196bfb665a815e7fe544.jpg" alt="">
                <h2>Pomodoro Time</h2>
            </div>
             <div class="moti elem" id="3">
                <img src="https://i.pinimg.com/1200x/91/53/dc/9153dc54f1ad4e8285c2676725c7afc0.jpg" alt="">
                <h2>Motivation</h2>
            </div>
            <div class="tictac elem" id="4">
                <img src="https://i.pinimg.com/1200x/14/32/56/143256759ebf87d66dcdbe462bdcec59.jpg" alt="">
                <h2>Tic Tac Toe</h2>
            </div>
        </div>
        <section class="fullElem">
            <button class="back"><i class="ri-close-line"></i></button>
            <h2>To Do Page</h2>
        </section>
        <section class="fullElem">
            <button class="back"><i class="ri-close-line"></i></button>
            <h2>Daily Planner Page</h2>
        </section>
        <section class="fullElem">
            <button class="back"><i class="ri-close-line"></i></button>
            <h2>Pomodoro Time Page</h2>
        </section>
        <section class="fullElem">
            <button class="back"><i class="ri-close-line"></i></button>
            <h2>Motivation Page</h2>
        </section>
        <section class="fullElem">
            <button class="back"><i class="ri-close-line"></i></button>
            <h2>Tic Tac Toe Page</h2>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
